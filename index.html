<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Mitra — your wise companion for life's difficult moments. Rooted in Gita, Ramayana, history and psychology.">
<meta name="theme-color" content="#534AB7">
<meta property="og:title" content="Mitra — Your Wise Companion">
<meta property="og:description" content="Best friend, parent and teacher in every difficult moment.">
<title>Mitra — Your Wise Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-50:#EEEDFE;--purple-100:#CECBF6;--purple-200:#AFA9EC;
    --purple-400:#7F77DD;--purple-600:#534AB7;--purple-800:#3C3489;--purple-900:#26215C;
    --amber-50:#FAEEDA;--amber-200:#EF9F27;--amber-600:#854F0B;--amber-800:#633806;
    --green-50:#EAF3DE;--green-600:#3B6D11;--green-800:#27500A;
    --teal-50:#E1F5EE;--teal-600:#0F6E56;
    --gray-50:#F8F7F4;--gray-100:#F1EFE8;--gray-200:#D3D1C7;
    --gray-600:#5F5E5A;--gray-800:#2C2C2A;
    --text-primary:#1A1A18;--text-secondary:#5F5E5A;--text-hint:#8E8D88;
    --bg-page:#F8F7F4;--bg-card:#FFFFFF;--bg-input:#FFFFFF;
    --border-light:rgba(0,0,0,0.08);--border-mid:rgba(0,0,0,0.14);
    --shadow-sm:0 1px 3px rgba(0,0,0,0.07);
    --shadow-md:0 4px 16px rgba(0,0,0,0.10);
    --radius-sm:8px;--radius-md:12px;--radius-lg:18px;--radius-full:999px;
    --font-sans:'Inter',system-ui,sans-serif;
    --font-serif:'Lora',Georgia,serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --text-primary:#EEECEA;--text-secondary:#A8A6A0;--text-hint:#6E6D68;
      --bg-page:#1A1A18;--bg-card:#242420;--bg-input:#2C2C28;
      --border-light:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.12);
      --shadow-sm:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 16px rgba(0,0,0,0.4);
      --purple-50:#1E1C3A;--purple-100:#2A2756;--green-50:#152110;--amber-50:#1F1608;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{height:100%;font-size:16px}
  body{
    font-family:var(--font-sans);background:var(--bg-page);color:var(--text-primary);
    height:100%;display:flex;flex-direction:column;align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{width:100%;max-width:680px;min-height:100vh;display:flex;flex-direction:column;position:relative}

  /* ── SPLASH ── */
  #splash{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:2.5rem 1.5rem;text-align:center;min-height:100vh;
  }
  .lamp{font-size:64px;margin-bottom:1.5rem;animation:glow 3s ease-in-out infinite}
  @keyframes glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.96)}}
  .brand{font-family:var(--font-serif);font-size:42px;font-weight:500;color:var(--purple-600);letter-spacing:-1px;margin-bottom:6px}
  .brand-sub{font-size:15px;color:var(--text-secondary);margin-bottom:2.5rem;line-height:1.6;font-style:italic;font-family:var(--font-serif)}
  .age-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-hint);margin-bottom:12px}
  .age-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
  .age-btn{
    padding:11px 24px;border-radius:var(--radius-full);border:1.5px solid var(--border-mid);
    background:var(--bg-card);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);
    cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);
  }
  .age-btn:hover{border-color:var(--purple-400);background:var(--purple-50)}
  .age-btn.selected{background:var(--purple-50);border-color:var(--purple-600);color:var(--purple-800);font-weight:500}
  .start-btn{
    padding:13px 44px;border-radius:var(--radius-full);border:none;
    background:var(--purple-600);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:all .18s;opacity:.4;pointer-events:none;
    box-shadow:0 2px 12px rgba(83,74,183,.3);
  }
  .start-btn.ready{opacity:1;pointer-events:auto}
  .start-btn.ready:hover{background:var(--purple-800);transform:translateY(-1px)}
  .sources{margin-top:2rem;font-size:11px;color:var(--text-hint);line-height:1.8}

  /* ── MAIN APP ── */
  #main{flex:1;display:none;flex-direction:column;min-height:100vh}
  .topbar{
    display:flex;align-items:center;gap:12px;padding:14px 16px;
    background:var(--bg-card);border-bottom:1px solid var(--border-light);
    position:sticky;top:0;z-index:10;box-shadow:var(--shadow-sm);
  }
  .topbar-avatar{
    width:40px;height:40px;border-radius:50%;background:var(--purple-50);
    display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
    border:1.5px solid var(--purple-100);
  }
  .topbar-text h1{font-size:16px;font-weight:600;color:var(--text-primary);font-family:var(--font-serif)}
  .topbar-text p{font-size:12px;color:var(--text-secondary)}
  .change-btn{
    margin-left:auto;font-size:12px;color:var(--text-hint);border:none;background:none;
    cursor:pointer;padding:6px 10px;border-radius:var(--radius-sm);transition:background .15s;
  }
  .change-btn:hover{background:var(--gray-100)}

  .tab-bar{
    display:flex;background:var(--bg-card);border-bottom:1px solid var(--border-light);
    position:sticky;top:69px;z-index:9;
  }
  .tab{
    flex:1;padding:12px 4px;font-size:13px;font-weight:500;color:var(--text-secondary);
    border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;
    transition:all .18s;font-family:var(--font-sans);
  }
  .tab.active{color:var(--purple-600);border-bottom-color:var(--purple-600)}

  .panel{padding:16px;flex:1}

  /* ── CHAT ── */
  .quick-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
  .chip{
    padding:7px 14px;border-radius:var(--radius-full);border:1px solid var(--border-mid);
    background:var(--bg-card);font-size:12px;color:var(--text-secondary);cursor:pointer;
    transition:all .15s;font-family:var(--font-sans);box-shadow:var(--shadow-sm);
  }
  .chip:hover{background:var(--purple-50);border-color:var(--purple-400);color:var(--purple-800)}
  .msgs{display:flex;flex-direction:column;gap:16px;margin-bottom:16px}
  .msg{display:flex;gap:10px;align-items:flex-end}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar{
    width:32px;height:32px;border-radius:50%;background:var(--purple-50);
    display:flex;align-items:center;justify-content:center;font-size:17px;
    flex-shrink:0;border:1px solid var(--purple-100);
  }
  .bubble{
    max-width:80%;padding:12px 15px;border-radius:18px 18px 18px 4px;
    font-size:14px;line-height:1.65;color:var(--text-primary);
    background:var(--bg-card);border:1px solid var(--border-light);
    box-shadow:var(--shadow-sm);
  }
  .msg.user .bubble{
    border-radius:18px 18px 4px 18px;background:var(--purple-600);
    color:#fff;border:none;box-shadow:0 2px 8px rgba(83,74,183,.25);
  }
  .wisdom-pull{
    margin-top:10px;padding:10px 14px;
    border-left:3px solid var(--purple-400);background:var(--purple-50);
    border-radius:0 8px 8px 0;font-size:13px;color:var(--purple-900);
    font-family:var(--font-serif);font-style:italic;line-height:1.55;
  }
  .wisdom-src{
    font-size:11px;color:var(--purple-600);font-style:normal;
    font-weight:600;margin-top:5px;display:block;font-family:var(--font-sans);
  }
  .typing-indicator{
    display:flex;gap:4px;align-items:center;padding:12px 16px;
    background:var(--bg-card);border-radius:18px 18px 18px 4px;
    border:1px solid var(--border-light);width:fit-content;box-shadow:var(--shadow-sm);
  }
  .tdot{width:7px;height:7px;border-radius:50%;background:var(--text-hint);animation:tdot 1.3s infinite}
  .tdot:nth-child(2){animation-delay:.18s}
  .tdot:nth-child(3){animation-delay:.36s}
  @keyframes tdot{0%,70%,100%{opacity:.2;transform:scale(.8)}35%{opacity:1;transform:scale(1)}}
  .input-area{
    display:flex;gap:8px;align-items:flex-end;
    background:var(--bg-card);padding:12px 16px;
    border-top:1px solid var(--border-light);
    position:sticky;bottom:0;
  }
  .input-area textarea{
    flex:1;resize:none;border-radius:var(--radius-md);padding:10px 14px;
    font-size:14px;min-height:44px;max-height:130px;font-family:var(--font-sans);
    background:var(--bg-input);border:1px solid var(--border-mid);color:var(--text-primary);
    outline:none;transition:border-color .15s;line-height:1.5;
  }
  .input-area textarea:focus{border-color:var(--purple-400)}
  .input-area textarea::placeholder{color:var(--text-hint)}
  .send{
    width:44px;height:44px;border-radius:50%;border:none;background:var(--purple-600);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .18s;font-size:18px;
  }
  .send:hover{background:var(--purple-800)}
  .send:disabled{opacity:.35;cursor:not-allowed}
  .err-msg{font-size:13px;color:#c0392b;padding:6px 16px;background:var(--bg-page)}

  /* ── STORIES ── */
  .story-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .sf-btn{
    padding:5px 13px;border-radius:var(--radius-full);border:1px solid var(--border-mid);
    background:var(--bg-card);font-size:12px;color:var(--text-secondary);cursor:pointer;
    transition:all .15s;font-family:var(--font-sans);
  }
  .sf-btn.active{background:var(--purple-50);color:var(--purple-800);border-color:var(--purple-400)}
  .story-grid{display:flex;flex-direction:column;gap:10px}
  .story-card{
    background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);
    padding:16px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);
  }
  .story-card:hover{border-color:var(--purple-200);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .story-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .stag{font-size:11px;padding:3px 9px;border-radius:var(--radius-full);background:var(--purple-50);color:var(--purple-800);font-weight:500}
  .stag.hist{background:var(--amber-50);color:var(--amber-600)}
  .stag.sci{background:var(--green-50);color:var(--green-600)}
  .story-title-text{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:5px;font-family:var(--font-serif)}
  .story-preview-text{font-size:13px;color:var(--text-secondary);line-height:1.5}
  .story-read{font-size:12px;color:var(--purple-600);margin-top:8px;font-weight:500}
  .story-detail{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:20px;margin-top:4px}
  .back-btn{
    display:flex;align-items:center;gap:5px;font-size:13px;color:var(--purple-600);
    border:none;background:none;cursor:pointer;padding:0 0 14px;font-family:var(--font-sans);
  }
  .story-detail h2{font-family:var(--font-serif);font-size:20px;font-weight:500;color:var(--text-primary);margin-bottom:6px;line-height:1.3}
  .story-source{font-size:12px;color:var(--text-hint);margin-bottom:14px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
  .story-body-text{font-size:14px;color:var(--text-primary);line-height:1.75;white-space:pre-line;font-family:var(--font-serif)}
  .moral-box{
    margin-top:18px;padding:14px 16px;background:var(--green-50);
    border-radius:var(--radius-md);border-left:3px solid var(--green-600);
  }
  .moral-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--green-600);margin-bottom:4px}
  .moral-text{font-size:14px;color:var(--green-800);line-height:1.55;font-family:var(--font-serif);font-style:italic}

  /* ── WISDOM QUOTES ── */
  .w-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .wf{
    padding:5px 13px;border-radius:var(--radius-full);border:1px solid var(--border-mid);
    background:var(--bg-card);font-size:12px;color:var(--text-secondary);cursor:pointer;
    transition:all .15s;font-family:var(--font-sans);
  }
  .wf.active{background:var(--purple-50);color:var(--purple-800);border-color:var(--purple-400)}
  .w-list{display:flex;flex-direction:column;gap:10px}
  .w-item{
    background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);
    padding:16px;box-shadow:var(--shadow-sm);
  }
  .w-text{
    font-family:var(--font-serif);font-size:15px;color:var(--text-primary);
    line-height:1.65;font-style:italic;margin-bottom:8px;
  }
  .w-source{font-size:12px;color:var(--purple-600);font-weight:600;font-family:var(--font-sans)}
  .w-tradition{font-size:11px;color:var(--text-hint);margin-top:2px;font-family:var(--font-sans)}

  /* ── RESPONSIVE ── */
  @media(max-width:480px){
    .brand{font-size:34px}
    .age-btn{padding:10px 18px;font-size:13px}
    .bubble{max-width:88%;font-size:13px}
    .panel{padding:12px}
    .topbar{padding:11px 14px}
  }
</style>
</head>
<body>
<div id="app">

<!-- ───────── SPLASH SCREEN ───────── -->
<div id="splash">
  <div class="lamp">🪔</div>
  <div class="brand">Mitra</div>
  <div class="brand-sub">Your best friend, parent &amp; teacher<br>in every difficult moment</div>
  <div class="age-label">Who are you?</div>
  <div class="age-row">
    <button class="age-btn" onclick="selectAge('kid','Child (6–12)','🌱')">Child &nbsp;·&nbsp; 6–12</button>
    <button class="age-btn" onclick="selectAge('teen','Teen (13–17)','🌿')">Teen &nbsp;·&nbsp; 13–17</button>
    <button class="age-btn" onclick="selectAge('adult','Adult (18+)','🌳')">Adult &nbsp;·&nbsp; 18+</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="enterApp()">Enter Mitra &rarr;</button>
  <div class="sources">Draws from · Bhagavad Gita · Ramayana · Mahabharata<br>Gandhi · APJ Kalam · Tagore · Vivekananda · Marcus Aurelius · Viktor Frankl</div>
</div>

<!-- ───────── MAIN APP ───────── -->
<div id="main">
  <div class="topbar">
    <div class="topbar-avatar" id="topAvatar">🪔</div>
    <div class="topbar-text">
      <h1>Mitra</h1>
      <p id="topSub">Your wise companion</p>
    </div>
    <button class="change-btn" onclick="goSplash()">Change age</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-chat" onclick="switchTab('chat')">💬 Talk to Mitra</button>
    <button class="tab" id="tab-stories" onclick="switchTab('stories')">📖 Wisdom Stories</button>
    <button class="tab" id="tab-wisdom" onclick="switchTab('wisdom')">✨ Quotes</button>
  </div>

  <!-- CHAT PANEL -->
  <div id="panel-chat" style="padding:0;display:flex;flex-direction:column;flex:1">
    <div style="padding:14px 16px 4px">
      <div class="quick-chips" id="chips"></div>
    </div>
    <div style="padding:0 16px;flex:1">
      <div class="msgs" id="msgs"></div>
    </div>
    <div class="err-msg" id="chatErr" style="display:none"></div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Tell Mitra what's happening…" rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send" id="sendBtn" onclick="sendMsg()" aria-label="Send message">&#10148;</button>
    </div>
  </div>

  <!-- STORIES PANEL -->
  <div id="panel-stories" class="panel" style="display:none">
    <div id="storyList">
      <div class="story-filters" id="storyFilters"></div>
      <div class="story-grid" id="storyGrid"></div>
    </div>
    <div id="storyDetail" style="display:none"></div>
  </div>

  <!-- WISDOM PANEL -->
  <div id="panel-wisdom" class="panel" style="display:none">
    <div class="w-filters" id="wFilters"></div>
    <div class="w-list" id="wList"></div>
  </div>
</div>

</div><!-- #app -->

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Change this to your deployed backend URL after deployment
// During local development it calls localhost:3001
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3001'
  : 'https://shinemitra-backend.vercel.app/';  // ← Replace after deploying backend

// ── STATE ────────────────────────────────────────────────────────────────────
let ageGroup = null, ageName = '', ageEmoji = '';
let chatHistory = [];
let storyFilter = 'all';
let wisdomFilter = 'all';

// ── AGE SELECTION ─────────────────────────────────────────────────────────────
function selectAge(g, n, e) {
  ageGroup = g; ageName = n; ageEmoji = e;
  document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  const sb = document.getElementById('startBtn');
  sb.classList.add('ready');
}

function enterApp() {
  if (!ageGroup) return;
  document.getElementById('splash').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'flex';
  document.getElementById('topAvatar').textContent = ageEmoji;
  document.getElementById('topSub').textContent = ageName + ' · Your wise companion';
  chatHistory = [];
  document.getElementById('msgs').innerHTML = '';
  switchTab('chat');
  buildChips();
  buildStories();
  buildWisdom();
  addMsg('mitra', welcomeMsg());
}

function goSplash() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('splash').style.display = 'flex';
}

function welcomeMsg() {
  const w = {
    kid:   'Namaste! 🙏 I\'m Mitra — your wise friend! Whenever something feels scary, confusing or unfair, I\'m right here. What\'s on your mind today?',
    teen:  'Hey. I\'m Mitra — not here to lecture, just genuinely here for you. Whatever you\'re going through — pressure, fear, confusion, conflict — I care. What\'s happening?',
    adult: 'Namaste. I\'m Mitra — a companion rooted in the Gita, Ramayana, history, and psychology. Whatever situation you\'re navigating — I\'m here. Tell me what\'s weighing on you.'
  };
  return w[ageGroup] || w.adult;
}

// ── QUICK CHIPS ───────────────────────────────────────────────────────────────
const QUICK_TOPICS = {
  kid:   ['Someone is being mean to me', 'I feel scared', 'My parents are fighting', 'I told a lie and feel bad', 'I failed my test', 'I feel very lonely'],
  teen:  ['Peer pressure to do something wrong', 'Feeling anxious & overwhelmed', 'Family conflict at home', 'I don\'t know what\'s right to do', 'I feel like I don\'t belong', 'Scared of failing'],
  adult: ['Facing a big moral dilemma', 'Anxiety & self-doubt', 'Family conflict', 'Feeling lost about life\'s purpose', 'How to deal with failure', 'Feeling lonely & isolated']
};

function buildChips() {
  const c = document.getElementById('chips');
  c.innerHTML = '';
  (QUICK_TOPICS[ageGroup] || []).forEach(q => {
    const b = document.createElement('button');
    b.className = 'chip'; b.textContent = q;
    b.onclick = () => { document.getElementById('userInput').value = q; sendMsg(); };
    c.appendChild(b);
  });
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const c = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'user' ? (ageEmoji || '👤') : '🪔';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  // Detect and style quoted wisdom lines (lines starting with ")
  const html = text.replace(/\n/g, '<br>');
  bub.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bub);
  c.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const c = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg mitra'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="msg-avatar">🪔</div>
    <div class="typing-indicator">
      <span class="tdot"></span><span class="tdot"></span><span class="tdot"></span>
    </div>`;
  c.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

async function sendMsg() {
  const inp = document.getElementById('userInput');
  const txt = inp.value.trim();
  if (!txt || !ageGroup) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  const errEl = document.getElementById('chatErr');
  errEl.style.display = 'none';
  addMsg('user', txt);
  chatHistory.push({ role: 'user', content: txt });
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/api/mitra`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: txt,
        ageGroup,
        ageName,
        history: chatHistory.slice(-6)
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Something went wrong');
    }

    const data = await res.json();
    hideTyping();
    chatHistory.push({ role: 'assistant', content: data.reply });
    addMsg('mitra', data.reply);
  } catch (err) {
    hideTyping();
    errEl.textContent = err.message || 'Mitra is unavailable. Please try again.';
    errEl.style.display = 'block';
    chatHistory.pop();
  }
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function switchTab(t) {
  ['chat', 'stories', 'wisdom'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === t);
    const p = document.getElementById('panel-' + id);
    if (id === 'chat') p.style.display = id === t ? 'flex' : 'none';
    else p.style.display = id === t ? 'block' : 'none';
  });
}

const STORY_FILTERS = [

function buildStories() {
  const fEl = document.getElementById('storyFilters');
  fEl.innerHTML = '';
  STORY_FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'sf-btn' + (f.k === 'all' ? ' active' : '');
    b.textContent = f.l;
    b.onclick = () => {
      storyFilter = f.k;
      document.querySelectorAll('.sf-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderStoryGrid();
    };
    fEl.appendChild(b);
  });
  renderStoryGrid();
}

function renderStoryGrid() {
  const g = document.getElementById('storyGrid');
  g.innerHTML = '';
  const filtered = storyFilter === 'all' ? STORIES : STORIES.filter(s => s.theme === storyFilter);
  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.innerHTML = `
      <div class="story-tags">${s.tags.map((t,i) => `<span class="stag${i===1?' hist':i===2?' sci':''}">${t}</span>`).join('')}</div>
      <div class="story-title-text">${s.title}</div>
      <div class="story-preview-text">${s.preview}</div>
      <div class="story-read">Read the full story →</div>`;
    card.onclick = () => showStory(s.id);
    g.appendChild(card);
  });
}

function showStory(id) {
  const s = STORIES.find(x => x.id === id);
  if (!s) return;
  document.getElementById('storyList').style.display = 'none';
  const dv = document.getElementById('storyDetail');
  dv.style.display = 'block';
  dv.innerHTML = `
    <button class="back-btn" onclick="closeStory()">&#8592; All stories</button>
    <div class="story-detail">
      <div class="story-tags">${s.tags.map((t,i) => `<span class="stag${i===1?' hist':''}">${t}</span>`).join('')}</div>
      <h2>${s.title}</h2>
      <div class="story-source">${s.source}</div>
      <div class="story-body-text">${s.body}</div>
      <div class="moral-box">
        <div class="moral-label">The lesson</div>
        <div class="moral-text">${s.moral}</div>
      </div>
    </div>`;
  dv.scrollIntoView({ behavior: 'smooth' });
}

function closeStory() {
  document.getElementById('storyDetail').style.display = 'none';
  document.getElementById('storyList').style.display = 'block';
}
